  <style>
    :root {
      --orange: #ff7a00;
      --orange-light: #ff9c3d;
      --white: #ffffff;
      --dark: #2b1500;
      --radius: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--orange), var(--orange-light));
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .contact-card {
      background: rgba(255,255,255,0.85);
      color: var(--dark);
      padding: 40px;
      border-radius: var(--radius);
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 0;
      color: var(--orange);
    }

    .contact-item {
      margin: 20px 0;
      font-size: 1.1rem;
    }

    a {
      color: var(--orange);
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }

    .back-button {
      display: inline-block;
      margin-top: 25px;
      background: var(--orange);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .back-button:hover {
      background: #e66f00;
    }
  </style>

</head>
